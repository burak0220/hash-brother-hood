<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" fill="none">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0070ff"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0055dd"/>
    </linearGradient>
    <linearGradient id="white" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0f8ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="dim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7ab0cc"/>
      <stop offset="100%" stop-color="#5090b0"/>
    </linearGradient>
    <filter id="g" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ig" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- === ICON: # integrated into a rounded square === -->
  <g transform="translate(6, 8)">
    <!-- Ambient glow -->
    <rect x="4" y="4" width="56" height="56" rx="16" fill="#00c0ff" opacity="0.07" filter="url(#bg)"/>

    <!-- Container -->
    <rect x="4" y="4" width="56" height="56" rx="14" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
    <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#accentV)" opacity="0.06"/>

    <!-- # Hash symbol - bold, modern, slightly rounded -->
    <g filter="url(#ig)">
      <!-- Verticals - slightly tilted for dynamism -->
      <rect x="23" y="12" width="4.5" height="40" rx="2.2" fill="url(#accent)" transform="rotate(-6, 25, 32)"/>
      <rect x="37" y="12" width="4.5" height="40" rx="2.2" fill="url(#accent)" transform="rotate(-6, 39, 32)"/>
      <!-- Horizontals -->
      <rect x="11" y="23" width="42" height="4" rx="2" fill="url(#accent)" opacity="0.9"/>
      <rect x="11" y="36" width="42" height="4" rx="2" fill="url(#accent)" opacity="0.9"/>
    </g>
  </g>

  <!-- === WORDMARK === -->
  <g transform="translate(78, 0)">

    <!-- hashbrotherhood - unified, lowercase, modern -->
    <!-- "hash" part - white/light -->
    <text y="43" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="34" font-weight="800" letter-spacing="-1.5" fill="url(#white)">hash</text>

    <!-- "brother" part - cyan gradient accent -->
    <text x="82" y="43" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="34" font-weight="800" letter-spacing="-1.5" fill="url(#accent)" filter="url(#g)">brother</text>

    <!-- "hood" part - white/light -->
    <text x="220" y="43" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="34" font-weight="800" letter-spacing="-1.5" fill="url(#white)">hood</text>

    <!-- Accent dot between sections - subtle -->
    <circle cx="80" cy="43" r="1.8" fill="#00e5ff" opacity="0.4"/>
    <circle cx="218" cy="43" r="1.8" fill="#00e5ff" opacity="0.4"/>

    <!-- Tagline -->
    <text y="62" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="9" fill="url(#dim)" letter-spacing="4.5" font-weight="600" text-transform="uppercase">HASHRATE MARKETPLACE</text>

    <!-- Underline accent -->
    <rect y="48" width="70" height="1.5" rx="0.75" fill="url(#accent)" opacity="0.25"/>
  </g>
</svg>
