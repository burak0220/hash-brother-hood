<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 56" fill="none">
  <defs>
    <linearGradient id="lg-gr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="lg-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Icon: 52x52 area, centered in 56px height with 2px padding -->
  <g transform="translate(0, 2)">

    <!-- Hexagonal frame -->
    <polygon points="26,3 46,14 46,38 26,49 6,38 6,14"
             fill="url(#lg-gr)" fill-opacity="0.1"
             stroke="url(#lg-gr)" stroke-width="2" opacity="0.85"/>

    <!-- Pickaxe HEAD — simple solid polygon
         Spike points upper-left (sharp), adze points upper-right (flat).
         All corners explicit — no curves that can misrender. -->
    <polygon
      points="7,14 19,10 26,9 40,13 42,20 29,25 25,22 19,27 10,22 7,17"
      fill="url(#lg-gr)"/>

    <!-- Pickaxe HANDLE — diagonal parallelogram going lower-right -->
    <polygon
      points="19,27 25,22 39,38 35,43"
      fill="url(#lg-gr)"/>

  </g>

  <!-- Wordmark: HASH·BROTHER·HOOD on one line -->
  <g transform="translate(62, 0)">
    <text y="34"
          font-family="'Inter','SF Pro Display','Segoe UI',sans-serif"
          font-size="28" font-weight="900" letter-spacing="-0.5">
      <tspan fill="#ffffff">HASH</tspan><tspan fill="url(#lg-text)">BROTHER</tspan><tspan fill="#ffffff">HOOD</tspan>
    </text>
    <text y="50"
          font-family="'Inter','SF Pro','Segoe UI',sans-serif"
          font-size="8" fill="#6a6a6a" letter-spacing="3.5" font-weight="600">
      HASHRATE MARKETPLACE
    </text>
  </g>

</svg>
