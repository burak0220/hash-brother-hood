<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#00c8e0"/>
      <stop offset="100%" stop-color="#0090ff"/>
    </linearGradient>
    <linearGradient id="iconGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c0d8e8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0090ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: Hexagonal shield with hash/mining symbol -->
  <g transform="translate(50, 50)" filter="url(#softGlow)">
    <!-- Outer hexagon -->
    <polygon points="0,-38 33,-19 33,19 0,38 -33,19 -33,-19"
             fill="none" stroke="url(#iconGrad)" stroke-width="2.5" opacity="0.9"/>
    <!-- Inner hexagon -->
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14"
             fill="url(#iconGrad2)" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.4"/>

    <!-- Hash symbol # (mining reference) -->
    <g stroke="url(#iconGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
      <line x1="-10" y1="-16" x2="-10" y2="16"/>
      <line x1="10" y1="-16" x2="10" y2="16"/>
      <line x1="-18" y1="-6" x2="18" y2="-6"/>
      <line x1="-18" y1="6" x2="18" y2="6"/>
    </g>

    <!-- Corner accent nodes -->
    <circle cx="0" cy="-38" r="2.5" fill="#00f0ff" opacity="0.8"/>
    <circle cx="33" cy="-19" r="2" fill="#00f0ff" opacity="0.5"/>
    <circle cx="33" cy="19" r="2" fill="#00f0ff" opacity="0.5"/>
    <circle cx="0" cy="38" r="2.5" fill="#00f0ff" opacity="0.8"/>
    <circle cx="-33" cy="19" r="2" fill="#00f0ff" opacity="0.5"/>
    <circle cx="-33" cy="-19" r="2" fill="#00f0ff" opacity="0.5"/>
  </g>

  <!-- Brand text -->
  <g transform="translate(100, 42)">
    <text font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="url(#textGrad)" letter-spacing="-0.5">
      Hash
    </text>
    <text x="87" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="url(#accentGrad)" letter-spacing="-0.5" filter="url(#glow)">
      Brother
    </text>
    <text x="225" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="url(#textGrad)" letter-spacing="-0.5">
      Hood
    </text>
  </g>

  <!-- Tagline -->
  <text x="100" y="68" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#5a7a8a" letter-spacing="3.5" font-weight="500">
    HASHRATE MARKETPLACE
  </text>

  <!-- Subtle accent line -->
  <line x1="100" y1="52" x2="310" y2="52" stroke="url(#accentGrad)" stroke-width="0.5" opacity="0.3"/>
</svg>
