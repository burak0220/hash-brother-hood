services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hashrent
      POSTGRES_USER: hashrent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hashrent_dev}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hashrent"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_pass} --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_pass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://hashrent:${DB_PASSWORD:-hashrent_dev}@postgres:5432/hashrent
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-abc123xyz}
      ENV: ${ENV:-development}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-Admin123!}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://localhost:4000"]}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-internal-secret-key-change-in-production-xyz789}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-1}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-7}
      LTC_NETWORK: ${LTC_NETWORK:-testnet}
      LTC_RPC_URL: ${LTC_RPC_URL:-http://localhost:9332}
      LTC_RPC_USER: ${LTC_RPC_USER:-}
      LTC_RPC_PASSWORD: ${LTC_RPC_PASSWORD:-}
      HOT_WALLET_ADDRESS: ${HOT_WALLET_ADDRESS:-}
      HOT_WALLET_PRIVATE_KEY: ${HOT_WALLET_PRIVATE_KEY:-}
      HD_WALLET_MNEMONIC: ${HD_WALLET_MNEMONIC:-}
      BLOCKCYPHER_TOKEN: ${BLOCKCYPHER_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_STRATUM_HOST: ${NEXT_PUBLIC_STRATUM_HOST:-stratum.hashbrotherhood.com}
      NEXT_PUBLIC_STRATUM_PORT: ${NEXT_PUBLIC_STRATUM_PORT:-3333}
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  stratum-proxy:
    build:
      context: ./services/stratum-proxy
      dockerfile: Dockerfile
    ports:
      - "3333:3333"
    environment:
      API_BASE_URL: http://api:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-internal-secret-key-change-in-production-xyz789}
      PROXY_HOST: 0.0.0.0
      PROXY_PORT: 3333
      HASHRATE_REPORT_INTERVAL: ${HASHRATE_REPORT_INTERVAL:-300}
      POOL_LOOKUP_CACHE_SEC: ${POOL_LOOKUP_CACHE_SEC:-60}
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

volumes:
  postgres_data:
  redis_data:
